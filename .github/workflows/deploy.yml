name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install mkdocs==1.6.1 mkdocs-material==8.5.11 mkdocs-ezlinks-plugin==0.1.14
      - run: mkdocs gh-deploy --force
